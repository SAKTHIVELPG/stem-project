<!DOCTYPE html>
<html>
<head>
  <title>Temperature Monitor</title>
</head>
<body>

<h1>Temperature Monitor</h1>

<h2 id="temp">Loading...</h2>

<input id="email" placeholder="Enter Email">
<input id="threshold" placeholder="Threshold (e.g. 50)">
<button onclick="setAlert()">Set Alert</button>

<br><br>

<button onclick="spike()">Simulate Spike</button>

<script>
const API = "https://temp-log.onrender.com"; // CHANGE if needed

async function fetchTemp() {
  const res = await fetch(API + "/api/temperature");
  const data = await res.json();

  document.getElementById("temp").innerText =
    "Temperature: " + data.temperature + " °C";
}

setInterval(fetchTemp, 1000);

async function spike() {
  await fetch(API + "/api/simulate-spike");
}

async function setAlert() {
  const email = document.getElementById("email").value;
  const threshold = document.getElementById("threshold").value;

  await fetch(API + "/api/temperature/set-alert", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ email, threshold }),
  });

  alert("Alert saved");
}
</script>

</body>
</html>
